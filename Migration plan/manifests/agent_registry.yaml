agents:
  - id: supervisor_router_agent
    name: Supervisor Router Agent
    type: router
    purpose: Classify queries and events, then route to SQL, RAG, forecast, RAID, revenue, data quality, or summary workflows.
    autonomy_level: 3
    tools:
      - semantic_router.classify
      - sql_memory_service.lookup
      - project_service.resolve_context
    human_approval_required: false

  - id: sql_agent
    name: SQL Agent
    type: structured_data_agent
    purpose: Answer structured questions using safe SQL and SQL memory before dynamic SQL generation.
    autonomy_level: 3
    tools:
      - sql_memory_service.lookup_template
      - sql_generation_service.generate_sql
      - sql_safety_service.validate_read_only
      - database_service.execute_query
      - query_feedback_service.record_result
    human_approval_required: false

  - id: rag_agent
    name: LlamaIndex RAG Agent
    type: retrieval_agent
    purpose: Answer document questions using LlamaIndex over SOWs, contracts, work packages, and uploaded documents.
    autonomy_level: 3
    tools:
      - llamaindex_service.retrieve
      - llamaindex_service.query_engine
      - citation_service.format_sources
    human_approval_required: false

  - id: forecast_variance_agent
    name: Forecast Variance Agent
    type: financial_analysis_agent
    purpose: Compare Sales baseline, PM initial forecast, previous reforecast, and latest approved forecast.
    autonomy_level: 4
    tools:
      - forecast_service.compare_versions
      - metrics_service.get_snapshot
      - plan_summary_service.get_monthly_summary
    human_approval_required: true

  - id: metrics_agent
    name: ETC/EAC Metrics Agent
    type: financial_metrics_agent
    purpose: Calculate ETC Revenue, ETC Cost, EAC Revenue, EAC Cost, GM Amount, and GM Percent.
    autonomy_level: 4
    tools:
      - metrics_service.calculate_snapshot
      - actuals_service.get_actuals
      - forecast_version_service.get_current_approved
    human_approval_required: false

  - id: revenue_recognition_agent
    name: Revenue Recognition Agent
    type: revenue_agent
    purpose: Determine whether revenue can be recognized based on achieved hours and milestone status.
    autonomy_level: 4
    tools:
      - revenue_recognition_service.calculate
      - milestone_service.get_revenue_milestones
      - actuals_service.get_monthly_hours
    human_approval_required: true

  - id: raid_recommendation_agent
    name: RAID Recommendation Agent
    type: governance_agent
    purpose: Suggest risks, issues, assumptions, or dependencies based on forecast variance, slippage, GM drop, and missing actuals.
    autonomy_level: 4
    tools:
      - raid_service.create_draft
      - metrics_service.get_snapshot
      - forecast_service.get_variance
    human_approval_required: true

  - id: contract_sow_agent
    name: Contract/SOW Agent
    type: contract_agent
    purpose: Validate milestones, acceptance criteria, obligations, pricing, and commercial clauses using LlamaIndex RAG.
    autonomy_level: 3
    tools:
      - llamaindex_service.retrieve
      - contract_service.extract_obligations
    human_approval_required: false

  - id: data_quality_agent
    name: Data Quality Agent
    type: quality_agent
    purpose: Detect missing actuals, stale forecasts, missing milestones, mismatched hours, missing RAID updates, and orphaned plan versions.
    autonomy_level: 4
    tools:
      - data_quality_service.run_checks
      - forecast_version_service.get_current_approved
      - actuals_service.get_actuals
    human_approval_required: true

  - id: mbr_summary_agent
    name: MBR Summary Agent
    type: narrative_agent
    purpose: Draft MBR and weekly summary commentary using metrics, variance, RAID, and contract findings.
    autonomy_level: 4
    tools:
      - summary_service.draft_mbr
      - metrics_service.get_snapshot
      - raid_service.get_open_items
      - forecast_service.get_variance
    human_approval_required: true
