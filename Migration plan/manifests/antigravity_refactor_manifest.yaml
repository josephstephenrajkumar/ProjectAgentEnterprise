project_name: ProjectAgentEnterprise_Option1_Refactor

repo:
  url: https://github.com/josephstephenrajkumar/ProjectAgentEnterprise
  decision:
    option_selected: Option 1
    drop_openclaw: true
    target_architecture: React + FastAPI + LangGraph + LlamaIndex + SQLite/ChromaDB

business_requirements:
  - Refactor away from OpenClaw framework.
  - Keep agentic AI capability using LangGraph.
  - Use LlamaIndex for document ingestion, semantic chunking, and RAG.
  - Implement router agents that route to SQL, RAG, specialist agents, or mixed flows.
  - Preserve SQL learning layer from QueryFeedback and SemanticMap.
  - Add SqlQueryMemory for reusable SQL templates.
  - Migrate baseline JSON from Project into versioned plan tables.
  - Support Sales baseline, PM initial forecast, and monthly reforecast.
  - Calculate ETC Revenue, ETC Cost, EAC Revenue, EAC Cost, GM Amount, GM Percent.
  - Use autonomous agents with human-in-the-loop approval.
  - Link RAID and Weekly Summary to forecast version.

target_stack:
  frontend:
    framework: React
    language: TypeScript
    build: Vite
    styling: TailwindCSS
  backend:
    framework: FastAPI
    language: Python
    server: Uvicorn
  agents:
    framework: LangGraph
    router: hybrid rules + embeddings + LLM fallback
  rag:
    framework: LlamaIndex
    vector_store: ChromaDB initially
    future_vector_store: pgvector or OpenSearch
  database:
    initial: SQLite
    future: Postgres/RDS

folders_to_create:
  - frontend-react/src/pages
  - frontend-react/src/components
  - frontend-react/src/api
  - frontend-react/src/state
  - backend/app/api
  - backend/app/schemas
  - backend/app/services
  - backend/app/agents
  - backend/app/graph
  - backend/app/rag
  - backend/app/db
  - backend/app/memory
  - backend/app/config
  - backend/migrations
  - backend/tests
  - manifests
  - docs/architecture
  - docs/api
  - docs/operations

folders_to_deprecate:
  - runtime
  - ui
  - openclaw-multiagent/runtime
  - openclaw-multiagent/ui

backend_modules:
  - backend/app/main.py
  - backend/app/api/chat.py
  - backend/app/api/ingestion.py
  - backend/app/api/forecast.py
  - backend/app/api/metrics.py
  - backend/app/api/agents.py
  - backend/app/services/forecast_version_service.py
  - backend/app/services/baseline_migration_service.py
  - backend/app/services/forecast_upload_service.py
  - backend/app/services/metrics_service.py
  - backend/app/services/actuals_service.py
  - backend/app/services/revenue_recognition_service.py
  - backend/app/services/raid_service.py
  - backend/app/services/summary_service.py
  - backend/app/services/data_quality_service.py
  - backend/app/memory/sql_memory_service.py
  - backend/app/rag/llamaindex_service.py
  - backend/app/graph/supervisor_graph.py
  - backend/app/graph/router.py

frontend_pages:
  - ProjectDashboard
  - ForecastUpload
  - ForecastVersionHistory
  - ForecastComparison
  - ForecastMetrics
  - RAIDImpact
  - WeeklySummary
  - AgentReviewQueue
  - ChatConsole

api_endpoints:
  chat:
    - POST /api/chat
  ingestion:
    - POST /api/ingest
    - GET /api/documents
  forecast:
    - POST /api/projects/{project_id}/forecast-upload
    - GET /api/projects/{project_id}/forecast-versions
    - GET /api/projects/{project_id}/forecast-versions/current
    - POST /api/forecast-versions/{plan_version_id}/approve
  metrics:
    - POST /api/projects/{project_id}/forecast-metrics/calculate
    - GET /api/projects/{project_id}/forecast-metrics/latest
  agents:
    - POST /api/agents/run-workflow
    - GET /api/agents/registry
    - GET /api/agent-actions
    - GET /api/approvals
    - POST /api/approvals/{approval_id}/approve
    - POST /api/approvals/{approval_id}/reject

agentic_workflows:
  forecast_uploaded:
    trigger: PM forecast upload completed
    steps:
      - forecast_variance_agent
      - metrics_agent
      - revenue_recognition_agent
      - raid_recommendation_agent
      - mbr_summary_agent
      - human_approval_queue
  monthly_close:
    trigger: actuals uploaded or reporting month closed
    steps:
      - data_quality_agent
      - metrics_agent
      - revenue_recognition_agent
      - raid_recommendation_agent
      - mbr_summary_agent
  user_chat:
    trigger: POST /api/chat
    steps:
      - supervisor_router_agent
      - sql_agent_or_rag_agent_or_specialist_agents
      - synthesizer

acceptance_criteria:
  - Project runs without OpenClaw runtime.
  - React frontend calls FastAPI directly.
  - LangGraph routes queries to SQL/RAG/specialist agents.
  - LlamaIndex replaces manual chunking/retrieval.
  - Baseline JSON migrates to ProjectPlanVersion and child tables.
  - PM forecast Excel creates new ProjectPlanVersion.
  - Reforecasts are versioned.
  - Latest approved forecast is current.
  - Metrics snapshots are calculated.
  - SQL memory is used before dynamic SQL generation.
  - Agent recommendations go to HumanApprovalQueue.
  - RAID and ProjectWeeklySummary link to plan_version_id.
